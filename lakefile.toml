name = "hex-lll-mathlib"
defaultTargets = ["HexLLLMathlib"]

# The full transitive Hex closure is pinned explicitly. Lake does not reconcile
# mismatched revisions of a package required at more than one point in the
# graph, so every Hex pin here must move together with its source repo.
[[require]]
name = "HexLLL"
git = "https://github.com/kim-em/hex-lll.git"
rev = "06532d363072bf210528444f26131be9f1b1eee8"

[[require]]
name = "HexGramSchmidtMathlib"
git = "https://github.com/kim-em/hex-gram-schmidt-mathlib.git"
rev = "80f61818333ce4c2ea9ea7fa2566aae0588a9f62"

[[require]]
name = "HexMatrixMathlib"
git = "https://github.com/kim-em/hex-matrix-mathlib.git"
rev = "32f9f7d7f3ee03052caa65e19a6b4cd4439a7115"

[[require]]
name = "HexGramSchmidt"
git = "https://github.com/kim-em/hex-gram-schmidt.git"
rev = "64a1e93d1f5149f86660b1a4e1da4158193c7ba4"

[[require]]
name = "HexMatrix"
git = "https://github.com/kim-em/hex-matrix.git"
rev = "0b7d7242225e73bda36ea0d58ccdc526363ae4c1"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0-rc2"

[[lean_lib]]
name = "HexLLLMathlib"
